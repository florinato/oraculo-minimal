name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main 

env:
  SERVICE_NAME: oraculo # Cambiado para que coincida con tu servicio actual
  REGION: europe-west1  # CAMBIADO: Tu región real
  GCP_PROJECT_ID: halogen-valve-360911 # Tu ID de proyecto

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Autenticación con Google Cloud
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 2. Configurar el SDK de Google Cloud
      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      # 3. Configurar autenticación para Docker
      - name: Configure Docker Auth
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 4. Crear el repositorio de Artifact Registry si no existe
      - name: Create Artifact Registry Repository
        run: |
          gcloud artifacts repositories create cloud-run-source-deploy \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --quiet || true

      # 5. Compilar y Subir la Imagen Docker
      - name: Build and Push Container
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 6. Desplegar en Google Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --service-account=rag-app@halogen-valve-360911.iam.gserviceaccount.com
          env_vars: |
            NODE_ENV=production
            FRONTEND_API_SECRET=${{ secrets.FRONTEND_API_SECRET }}
            NEXT_PUBLIC_ASSETS_URL=${{ secrets.NEXT_PUBLIC_ASSETS_URL }}
            NEXT_PUBLIC_CHAT_API_URL=${{ secrets.NEXT_PUBLIC_CHAT_API_URL }}
            NEXT_PUBLIC_IMAGE_SERVER_TOKEN=${{ secrets.NEXT_PUBLIC_IMAGE_SERVER_TOKEN }}
            NEXT_PUBLIC_IS_SANDBOX=${{ secrets.NEXT_PUBLIC_IS_SANDBOX }}
            PI_NETWORK_API_KEY=${{ secrets.PI_NETWORK_API_KEY }}
