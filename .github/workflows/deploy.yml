name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main # Cambiar si tu rama principal es 'master' o tiene otro nombre

env:
  SERVICE_NAME: oraculo-minimal
  REGION: us-central1 # Puedes cambiar esto por la región de tu preferencia (ej. europe-west1)

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Autenticación con Google Cloud
      # Opción recomendada: Service Account Key (guardado como secret GCP_SA_KEY)
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 2. Configurar el SDK de Google Cloud
      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 3. Configurar autenticación para Docker en Artifact Registry
      - name: Configure Docker Auth
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # 4. Crear el repositorio de Artifact Registry si no existe
      - name: Create Artifact Registry Repository (if not exists)
        run: |
          gcloud artifacts repositories create ${{ env.SERVICE_NAME }}-repo \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Docker repository for Oráculo Minimal" \
            --quiet || true

      # 5. Compilar y Subir la Imagen Docker
      - name: Build and Push Container
        run: |
          IMAGE_TAG="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 6. Desplegar en Google Cloud Run
      # Nota: Se inyecta la variable de entorno GEMINI_API_KEY desde los GitHub Secrets del repositorio
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          flags: |
            --allow-unauthenticated
            --port=3000
          env_vars: |
            NODE_ENV=production
            FRONTEND_API_SECRET=${{ secrets.FRONTEND_API_SECRET }}
            NEXT_PUBLIC_ASSETS_URL=${{ secrets.NEXT_PUBLIC_ASSETS_URL }}
            NEXT_PUBLIC_CHAT_API_URL=${{ secrets.NEXT_PUBLIC_CHAT_API_URL }}
            NEXT_PUBLIC_IMAGE_SERVER_TOKEN=${{ secrets.NEXT_PUBLIC_IMAGE_SERVER_TOKEN }}
            NEXT_PUBLIC_IS_SANDBOX=${{ secrets.NEXT_PUBLIC_IS_SANDBOX }}
            PI_NETWORK_API_KEY=${{ secrets.PI_NETWORK_API_KEY }}
